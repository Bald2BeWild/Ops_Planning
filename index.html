<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<title>OPS 24x7 Planning</title>

<style>
:root {
  --bg: #f5f6fa;
  --card: #ffffff;
  --text: #1f2937;
  --accent: #e30613;
  --border: #e5e7eb;
}

body.dark {
  --bg: #2b2f36;
  --card: #3a3f47;
  --text: #e5e7eb;
  --border: #4b5563;
}

body {
  margin:0;
  font-family: Arial;
  background: var(--bg);
  color: var(--text);
}

.container {
  padding:20px;
}

.topbar {
  display:flex;
  justify-content:space-between;
  margin-bottom:10px;
}

.card {
  background:var(--card);
  padding:10px;
  border-radius:8px;
  margin-bottom:10px;
}

button {
  padding:6px 10px;
  border:none;
  border-radius:6px;
  cursor:pointer;
  background:var(--accent);
  color:white;
}

.table {
  width:100%;
  border-collapse: collapse;
}

.table th, .table td {
  border:1px solid var(--border);
  text-align:center;
  padding:4px;
}

.weekend {
  background:#ffe5e5;
}

.dark .weekend {
  background:#4a2a2a;
}

.critical {
  background:#ffcccc;
}

.hidden {
  display:none;
}
</style>
</head>

<body>

<div class="container">

<div class="topbar">
  <div>
    <button onclick="prevMonth()">◀</button>
    <span id="monthLabel"></span>
    <button onclick="nextMonth()">▶</button>
    <button onclick="goToday()">HOY</button>
  </div>

  <button onclick="toggleDark()">🌙</button>
</div>

<div class="card" id="alerts"></div>

<div class="card">
<table class="table" id="table"></table>
</div>

<div class="card hidden" id="detail"></div>

</div>

<script>

let month = new Date();
let workers = [
  {name:"Bruno Verdú Belmar", role:"TL"},
  {name:"TBD", role:"OP"},
  {name:"Operador 2", role:"OP"},
  {name:"Coordinador 1", role:"COORD"}
];

function render(){
  renderHeader();
  renderTable();
  renderAlerts();
}

function renderHeader(){
  document.getElementById("monthLabel").innerText =
    month.toLocaleString('es',{month:'long',year:'numeric'});
}

function isWeekend(d){
  let day = new Date(month.getFullYear(),month.getMonth(),d).getDay();
  return day===0||day===6;
}

function renderTable(){
  let table = document.getElementById("table");
  table.innerHTML="";

  let tr = "<tr><th>Nombre</th>";
  let days = new Date(month.getFullYear(),month.getMonth()+1,0).getDate();

  for(let d=1; d<=days; d++){
    tr += `<th class="${isWeekend(d)?'weekend':''}">${d}</th>`;
  }
  tr+="</tr>";
  table.innerHTML+=tr;

  workers.forEach(w=>{
    let row = `<tr><td onclick="showDetail('${w.name}')">${w.name}</td>`;
    for(let d=1; d<=days; d++){
      row+=`<td class="${isWeekend(d)?'weekend':''}"></td>`;
    }
    row+="</tr>";
    table.innerHTML+=row;
  });
}

function renderAlerts(){
  document.getElementById("alerts").innerText =
    "✔ Sin incidencias críticas";
}

function showDetail(name){
  let d = document.getElementById("detail");
  d.classList.remove("hidden");
  d.innerHTML = `<b>${name}</b><br>Resumen próximamente`;
}

function prevMonth(){ month.setMonth(month.getMonth()-1); render(); }
function nextMonth(){ month.setMonth(month.getMonth()+1); render(); }
function goToday(){ month=new Date(); render(); }

function toggleDark(){
  document.body.classList.toggle("dark");
}

render();

</script>

</body>
</html>
